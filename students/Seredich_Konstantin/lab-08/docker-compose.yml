services:
  request-service:
    build:
      context: .
      dockerfile: services/request_service/Dockerfile
    container_name: request-service
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://user:password@requests-db:5432/requests
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: password
      GROUP_SERVICE_URL: http://group-service:8000
    depends_on:
      requests-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - pso-network
    restart: unless-stopped

  group-service:
    build:
      context: .
      dockerfile: services/group_service/Dockerfile
    container_name: group-service
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://user:password@groups-db:5432/groups
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: password
    depends_on:
      groups-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - pso-network
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification_service/Dockerfile
    container_name: notification-service
    environment:
      PYTHONUNBUFFERED: "1"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: password
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - pso-network
    restart: unless-stopped

  requests-db:
    image: postgres:15-alpine
    container_name: requests-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: requests
    volumes:
      - requests-data:/var/lib/postgresql/data
    networks:
      - pso-network
    restart: unless-stopped

  groups-db:
    image: postgres:15-alpine
    container_name: groups-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: groups
    volumes:
      - groups-data:/var/lib/postgresql/data
    networks:
      - pso-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - pso-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - request-service
      - group-service
    networks:
      - pso-network
    restart: unless-stopped

volumes:
  requests-data:
  groups-data:
  rabbitmq-data:

networks:
  pso-network:
    driver: bridge
